<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcf6ba;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#bf953f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbf5b7;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#aa771c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf953f;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="eyeIris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#1a1a1a" />

  <g stroke="url(#goldGrad)" stroke-width="1" opacity="0.6">
    <line x1="250" y1="250" x2="250" y2="50" />
    <line x1="250" y1="250" x2="450" y2="250" />
    <line x1="250" y1="250" x2="250" y2="450" />
    <line x1="250" y1="250" x2="50" y2="250" />
    <line x1="250" y1="250" x2="400" y2="100" />
    <line x1="250" y1="250" x2="100" y2="100" />
    <line x1="250" y1="250" x2="400" y2="400" />
    <line x1="250" y1="250" x2="100" y2="400" />
  </g>

  <polygon points="250,80 430,400 70,400" fill="none" stroke="url(#goldGrad)" stroke-width="8" filter="url(#shadow)" />

  <path d="M 160 300 Q 250 180 340 300" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
  <path d="M 160 300 Q 250 380 340 300" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />

  <circle cx="250" cy="295" r="35" fill="white" stroke="#bf953f" stroke-width="1" />
  <circle cx="250" cy="295" r="25" fill="url(#eyeIris)" />
  <circle cx="242" cy="288" r="5" fill="white" fill-opacity="0.6" />

  <text x="250" y="450" font-family="Serif" font-size="24" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="5">
    NOVUS ORDO SECLORUM
  </text>
</svg>